name: validate-wallets

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: validate-wallets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Validate wallets manifest
        run: bun scripts/validateWallets.js
