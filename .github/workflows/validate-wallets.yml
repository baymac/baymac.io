name: validate-wallets

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: validate-wallets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Validate wallets manifest
        run: node scripts/validateWallets.js
